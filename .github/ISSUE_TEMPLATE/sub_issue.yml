name: Sub-issue
description: Break a large feature or bug into a piece small enough for one PR. Must be linked to a parent issue.
title: "[Sub]: "
labels: ["sub-issue", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Sub-issues exist to split a parent feature or bug into chunks that each fit within the 250-line PR limit. If your work does not come from a parent issue, use the Bug report or Feature request template instead.

        A sub-issue covers **one deliverable** — something that can be merged on its own without breaking `main`. If you cannot describe what merged looks like without describing the rest of the parent, your split is too fine. Go back to the parent and redraw the seam.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: A parent issue exists and is linked below.
          required: true
        - label: A maintainer has reviewed the breakdown and the scope of this sub-issue is agreed.
          required: true
        - label: This sub-issue is not already covered by another open sub-issue on the parent.
          required: true

  - type: input
    id: parent
    attributes:
      label: Parent issue
      description: The issue number this sub-issue belongs to.
      placeholder: "#42"
    validations:
      required: true

  - type: input
    id: summary
    attributes:
      label: Summary
      description: One sentence stating the single deliverable this issue covers.
      placeholder: Add the localStorage write call triggered on every cart mutation
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: |
        What is included and what is explicitly excluded. Be specific enough that two students reading this independently would start on the same thing.
      placeholder: |
        Included: writing cart state to localStorage on add, remove, and quantity change events.
        Excluded: reading from localStorage on load — that is covered in #44.
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: Definition of done
      description: The conditions a reviewer checks to confirm this sub-issue is complete. Write them as a checklist.
      placeholder: |
        - [ ] Adding an item writes the updated cart to localStorage.
        - [ ] Removing an item writes the updated cart to localStorage.
        - [ ] Changing quantity writes the updated cart to localStorage.
        - [ ] Unit tests cover all three mutations.
    validations:
      required: true

  - type: textarea
    id: order
    attributes:
      label: Dependencies
      description: Any sub-issues that must merge before work on this one can start. Leave blank if none.
      placeholder: Blocked by #43 (cart mutation refactor must land first).
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Links, notes, or context. Optional.
    validations:
      required: false
